name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pymobiledevice3 PySide6 IPython pyimg4 ipsw_parser

      - name: Download DDI data from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ddi-data --pattern "ddi_data.zip" --dir .
          python -m zipfile -e ddi_data.zip .
          dir ddi_data

      - name: Download and extract Apple Mobile Device Support
        shell: pwsh
        run: |
          Write-Host "Downloading iTunes installer..."
          Invoke-WebRequest -Uri "https://www.apple.com/itunes/download/win64" -OutFile iTunes64Setup.exe
          Write-Host "Extracting MSI..."
          Start-Process -FilePath "iTunes64Setup.exe" -ArgumentList "/extract `"$PWD\itunes_extracted`"" -Wait -NoNewWindow
          Write-Host "Extracted files:"
          Get-ChildItem -Path itunes_extracted -Recurse | ForEach-Object { Write-Host $_.FullName }
          New-Item -ItemType Directory -Path "apple_driver" -Force
          $msi = Get-ChildItem -Path itunes_extracted -Filter "*MobileDevice*" -Recurse | Select-Object -First 1
          if ($msi) {
            Write-Host "Found: $($msi.FullName)"
            Copy-Item $msi.FullName "apple_driver\AppleMobileDeviceSupport64.msi"
          } else {
            Write-Host "AppleMobileDeviceSupport not found, copying all MSI files..."
            Copy-Item "itunes_extracted\*.msi" "apple_driver\" -ErrorAction SilentlyContinue
          }
          dir apple_driver
          Remove-Item -Recurse -Force itunes_extracted, iTunes64Setup.exe

      - name: Build EXE
        run: python -m PyInstaller build.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevImageWin
          path: dist/DevImageWin.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DevImageWin.exe
