name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pymobiledevice3 PySide6 IPython pyimg4 ipsw_parser

      - name: Download DDI data from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ddi-data --pattern "ddi_data.zip" --dir .
          python -m zipfile -e ddi_data.zip .
          dir ddi_data

      - name: Download and extract Apple Mobile Device Support
        shell: pwsh
        run: |
          Write-Host "Downloading iTunes installer..."
          curl -L -o iTunes64Setup.exe "https://www.apple.com/itunes/download/win64"
          $size = (Get-Item iTunes64Setup.exe).Length / 1MB
          Write-Host "Downloaded: $([math]::Round($size, 1)) MB"

          Write-Host "Extracting with 7-Zip..."
          7z x iTunes64Setup.exe -oitunes_extracted -y

          Write-Host "Extracted contents:"
          Get-ChildItem -Path itunes_extracted -Recurse -Name

          New-Item -ItemType Directory -Path "apple_driver" -Force | Out-Null
          $msi = Get-ChildItem -Path itunes_extracted -Filter "*MobileDevice*" -Recurse | Select-Object -First 1
          if ($msi) {
            Write-Host "Found driver: $($msi.Name) ($([math]::Round($msi.Length / 1MB, 1)) MB)"
            Copy-Item $msi.FullName "apple_driver\AppleMobileDeviceSupport64.msi"
          } else {
            Write-Host "ERROR: AppleMobileDeviceSupport MSI not found in extracted files"
            exit 1
          }
          Remove-Item -Recurse -Force itunes_extracted, iTunes64Setup.exe

      - name: Build iOS 17+ version
        run: |
          $env:BUILD_TARGET = "ios17plus"
          python -m PyInstaller build.spec --clean --noconfirm

      - name: Build Legacy version (iOS 11.4-16.7)
        run: |
          $env:BUILD_TARGET = "legacy"
          python -m PyInstaller build.spec --clean --noconfirm

      - name: List build output
        run: |
          dir dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DevImageWin
          path: |
            dist/DevImageWin_iOS17+.exe
            dist/DevImageWin_Legacy.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} — iOS Developer Setup Tool
          body: |
            ## DevImageWin ${{ github.ref_name }}

            A Windows GUI tool for iOS developers to enable Developer Mode and mount Developer Disk Image — no Xcode or macOS required.

            ### Downloads

            | File | iOS Version | Size |
            |------|------------|------|
            | `DevImageWin_iOS17+.exe` | iOS 17.0 and above | ~100MB |
            | `DevImageWin_Legacy.exe` | iOS 11.4 – 16.7 | ~550MB |

            > **Most users should download `DevImageWin_iOS17+.exe`** — it covers all modern iOS devices.

            ### Features

            - **Detect iOS Device** — Auto-detect USB-connected iPhone/iPad, display device name, iOS version, model, UDID
            - **Enable Developer Mode** — One-click enable with automatic device restart and confirmation handling
            - **Mount Developer Disk Image** — Bundled images for iOS 11.4–16.7; iOS 17+ via Apple TSS online signing
            - **Auto-install Apple Driver** — Bundled Apple Mobile Device Support, no need to install iTunes manually

            ### Usage

            1. Download the EXE matching your iOS version
            2. Connect your iPhone/iPad to PC via USB
            3. Run the app, click **Detect Device**
            4. Follow the prompts to enable Developer Mode and mount the disk image

            ### System Requirements

            - Windows 10/11 (64-bit)
            - iOS device connected via USB
            - Internet connection (iOS 17+ only, for Apple TSS signing)

            ### Notes

            - First launch may prompt for admin permission to install Apple device driver
            - After enabling Developer Mode, the device will restart — wait for it to finish and unlock before detecting again
            - If mount fails with a network error, check your internet connection or disable proxy and retry
            - Log file `DevImageWin.log` is generated next to the exe for troubleshooting
          files: |
            dist/DevImageWin_iOS17+.exe
            dist/DevImageWin_Legacy.exe
